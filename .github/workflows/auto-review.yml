name: Automated Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  validate-automation-config:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Validate pre-commit config
        run: |
          python -m pip install --upgrade pip pre-commit
          pre-commit validate-config

      - name: Lint GitHub Actions workflows
        uses: docker://rhysd/actionlint:1.7.7

  swarm-review:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup GitHub CLI auth
        run: echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token

      - name: Run review swarm
        env:
          PR_NUM: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          PR_DATA=$(gh pr view "$PR_NUM" --json files,title,body,labels)
          REVIEW_OUTPUT=$(npx -y ruv-swarm@1.0.20 github review-all \
            --pr "$PR_NUM" \
            --pr-data "$PR_DATA" \
            --agents "security,performance,style,architecture")

          {
            echo "## Code Review Swarm Output"
            echo
            echo '```'
            echo "$REVIEW_OUTPUT"
            echo '```'
          } > review-output.md

      - name: Post review summary comment
        if: ${{ !github.event.pull_request.head.repo.fork }}
        env:
          PR_NUM: ${{ github.event.pull_request.number }}
        run: gh pr comment "$PR_NUM" --body-file review-output.md
