# Compose static check: repo-root scripts/compose-validate.sh (not under stacks/).
name: Stacks compose validate

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  compose-config:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify repo layout (no root-level hive/ or stack duplicates)
        run: |
          chmod +x scripts/verify-repo-layout.sh
          scripts/verify-repo-layout.sh

      - name: Validate compose interpolation
        run: |
          chmod +x scripts/compose-validate.sh
          scripts/compose-validate.sh
