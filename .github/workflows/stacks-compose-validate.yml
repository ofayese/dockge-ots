name: Stacks compose validate

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  compose-config:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate compose interpolation
        run: |
          chmod +x stacks/scripts/compose-validate.sh
          stacks/scripts/compose-validate.sh
