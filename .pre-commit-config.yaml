minimum_pre_commit_version: "4.4.0"
fail_fast: false

repos:
  # ──────────────────────────────────────────────────────────────────
  # STANDARD HOOKS
  # ──────────────────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      # docs/, .github/, and .cursor/ on Synology SMB mounts often reject in-place rewrites (EINVAL /
      # OSError 22). Excluded here so local pre-commit succeeds on /Volumes/...; run full fixups on APFS.
      - id: trailing-whitespace
        exclude: ^(docs/|\.cursor/|\.github/|\.vscode/|\.claude-flow/)
      - id: end-of-file-fixer
        exclude: ^(docs/|\.cursor/|\.github/|\.vscode/|\.claude-flow/)
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-json

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        exclude: ^(docs/|\.cursor/|\.github/|\.vscode/|\.claude-flow/)
        additional_dependencies: ["prettier@3.2.5"]
        types_or:
          - javascript
          - jsx
          - ts
          - tsx
          - json
          - yaml
          - markdown
          - html
          - css
          - scss

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.0
    hooks:
      - id: gitleaks
        stages: [pre-push, manual]

  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.13.1-1
    hooks:
      - id: shfmt
        types: [shell]

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        types: [shell]
        exclude: ^tests/shell/

  # ──────────────────────────────────────────────────────────────────
  # LOCAL HOOKS: CUSTOM SAFETY & VALIDATION
  # (flake8/mypy: not on default commit — see AGENTS.md; run manually if needed.)
  # ──────────────────────────────────────────────────────────────────
  - repo: local
    hooks:
      - id: python-no-timeout-subprocess
        name: "Python: detect subprocess.run without timeout"
        entry: hooks/python-no-timeout-subprocess.py
        language: python
        files: ^(docs/hive/tools/|scripts/|tests/).*\.py$
        pass_filenames: true

      - id: python-unsafe-dict-iteration
        name: "Python: detect unsafe depends_on dict formatting"
        entry: hooks/python-unsafe-dict-iteration.py
        language: python
        files: ^(docs/hive/tools/|scripts/|tests/).*\.py$
        pass_filenames: true

      - id: shell-unsafe-sed
        name: "Shell: detect sed without escaping"
        entry: hooks/shell-unsafe-sed.sh
        language: script
        types: [shell]
        pass_filenames: true

      - id: shell-bash-regex-alternation
        name: "Shell: detect unsafe bash regex alternation"
        entry: hooks/shell-bash-regex-alternation.sh
        language: script
        types: [shell]
        pass_filenames: true

      - id: shell-docker-compose-no-err
        name: "Shell: detect docker compose without error propagation"
        entry: hooks/shell-docker-compose-no-err.sh
        language: script
        types: [shell]
        pass_filenames: true

      - id: node-zod-schema-wrapper
        name: "Node.js: detect Zod schemas not wrapped in z.object()"
        entry: hooks/node-zod-schema-wrapper.js
        language: node
        files: ^(stacks/.*\.js|stacks/.*\.ts)$
        pass_filenames: true

      - id: pytest-unit-tests
        name: "Run Python unit tests"
        entry: hooks/run-pytest.sh
        language: script
        files: ^tests/.*\.py$
        pass_filenames: false
        stages: [pre-commit]
        verbose: true

      - id: bats-shell-integration
        name: "Run shell integration tests (bats)"
        entry: hooks/run-bats.sh
        language: script
        types: [shell]
        pass_filenames: false
        stages: [pre-commit]
        verbose: true

      - id: inventory-static-analyzer
        name: "Run inventory static analyzer"
        entry: hooks/run-analyzer.sh
        language: script
        files: ^(stacks/.*compose\.ya?ml|docs/hive/tools/inventory\.py)$
        pass_filenames: false
        stages: [pre-commit]
        verbose: true

  - repo: meta
    hooks:
      - id: check-hooks-apply
      - id: check-useless-excludes
