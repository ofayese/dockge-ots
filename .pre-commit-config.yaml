minimum_pre_commit_version: "4.4.0"
fail_fast: false

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      # docs/, .github/, and .cursor/ on Synology SMB mounts often reject in-place rewrites (EINVAL /
      # OSError 22). Excluded here so local pre-commit succeeds on /Volumes/...; run full fixups on APFS.
      - id: trailing-whitespace
        exclude: ^(docs/|\.cursor/|\.github/)
      - id: end-of-file-fixer
        exclude: ^(docs/|\.cursor/|\.github/)
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-json

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        exclude: ^(docs/|\.cursor/|\.github/)
        additional_dependencies: ["prettier@3.2.5"]
        types_or:
          - javascript
          - jsx
          - ts
          - tsx
          - json
          - yaml
          - markdown
          - html
          - css
          - scss

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.0
    hooks:
      - id: gitleaks
        stages: [pre-push, manual]

  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.13.1-1
    hooks:
      - id: shfmt
        types: [shell]

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        types: [shell]

  - repo: meta
    hooks:
      - id: check-hooks-apply
      - id: check-useless-excludes
