minimum_pre_commit_version: "4.4.0"
fail_fast: false

repos:
  # ──────────────────────────────────────────────────────────────────
  # STANDARD HOOKS
  # ──────────────────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        exclude: ^(docs/|\.cursor/|\.github/)
      - id: end-of-file-fixer
        exclude: ^(docs/|\.cursor/|\.github/)
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-json

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        exclude: ^(docs/|\.cursor/|\.github/)
        additional_dependencies: ["prettier@3.2.5"]
        types_or:
          - javascript
          - jsx
          - ts
          - tsx
          - json
          - yaml
          - markdown
          - html
          - css
          - scss

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.0
    hooks:
      - id: gitleaks
        stages: [pre-push, manual]

  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.13.1-1
    hooks:
      - id: shfmt
        types: [shell]

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        types: [shell]

  # ──────────────────────────────────────────────────────────────────
  # PYTHON: PEP8, TYPING, SECURITY
  # ──────────────────────────────────────────────────────────────────
  - repo: https://github.com/PyCQA/flake8
    rev: "7.0.0"
    hooks:
      - id: flake8
        args: ["--max-line-length=120", "--extend-ignore=E203,W503"]
        files: ^(docs/hive/tools/|scripts/|tests/).*\.py$

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: "v1.8.0"
    hooks:
      - id: mypy
        args: ["--strict", "--ignore-missing-imports"]
        files: ^(docs/hive/tools/|scripts/|tests/).*\.py$
        additional_dependencies:
          - types-PyYAML
          - types-requests

  # ──────────────────────────────────────────────────────────────────
  # LOCAL HOOKS: CUSTOM SAFETY & VALIDATION
  # ──────────────────────────────────────────────────────────────────
  - repo: local
    hooks:
      # Python: Unescaped subprocess.run without timeout
      - id: python-no-timeout-subprocess
        name: "Python: detect subprocess.run without timeout"
        entry: hooks/python-no-timeout-subprocess.py
        language: python
        files: ^(docs/hive/tools/|scripts/|tests/).*\.py$
        pass_filenames: true

      # Python: Unsafe dict iteration patterns
      - id: python-unsafe-dict-iteration
        name: "Python: detect unsafe dict iteration"
        entry: hooks/python-unsafe-dict-iteration.py
        language: python
        files: ^(docs/hive/tools/|scripts/|tests/).*\.py$
        pass_filenames: true

      # Shell: sed without escaping
      - id: shell-unsafe-sed
        name: "Shell: detect sed without escaping"
        entry: hooks/shell-unsafe-sed.sh
        language: script
        types: [shell]
        pass_filenames: true

      # Shell: bash regex alternation
      - id: shell-bash-regex-alternation
        name: "Shell: detect unsafe bash regex alternation"
        entry: hooks/shell-bash-regex-alternation.sh
        language: script
        types: [shell]
        pass_filenames: true

      # Shell: docker compose without error propagation
      - id: shell-docker-compose-no-err
        name: "Shell: detect docker compose without error propagation"
        entry: hooks/shell-docker-compose-no-err.sh
        language: script
        types: [shell]
        pass_filenames: true

      # Node.js: Zod schemas not wrapped in z.object()
      - id: node-zod-schema-wrapper
        name: "Node.js: detect Zod schemas not wrapped in z.object()"
        entry: hooks/node-zod-schema-wrapper.js
        language: node
        files: ^(stacks/.*\.js|stacks/.*\.ts)$
        pass_filenames: true

      # Run unit tests
      - id: pytest-unit-tests
        name: "Run Python unit tests"
        entry: hooks/run-pytest.sh
        language: script
        files: ^tests/.*\.py$
        pass_filenames: false
        stages: [commit]
        verbose: true

      # Run shell integration tests
      - id: bats-shell-integration
        name: "Run shell integration tests (bats)"
        entry: hooks/run-bats.sh
        language: script
        types: [shell]
        pass_filenames: false
        stages: [commit]
        verbose: true

      # Run inventory analyzer
      - id: inventory-static-analyzer
        name: "Run inventory static analyzer"
        entry: hooks/run-analyzer.sh
        language: script
        files: ^(stacks/.*compose\.ya?ml|docs/hive/tools/inventory\.py)$
        pass_filenames: false
        stages: [commit]
        verbose: true

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        exclude: ^(docs/|\.cursor/|\.github/)
        additional_dependencies: ["prettier@3.2.5"]
        types_or:
          - javascript
          - jsx
          - ts
          - tsx

  - repo: meta
    hooks:
      - id: check-hooks-apply
      - id: check-useless-excludes
