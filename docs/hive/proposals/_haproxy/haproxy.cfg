# HAProxy — hive proposal entry (HIVE_OBJECTIVE stretch path).
# Canonical body lives next to runtime assets (edit this file only there):
#   <repo-root>/stacks/_haproxy/haproxy.cfg
# Wrong path (do not use): .../stacks/docs/hive/... — docs/ must not live under stacks/.
#
# On the NAS, point HAProxy at the stacks path, e.g.:
#   haproxy -f /volume1/docker/dockge/stacks/_haproxy/haproxy.cfg
# If HAProxy is already wired to /volume1/docker/haproxy.cfg (sibling of dockge/), use that
# file only as a thin wrapper: include /volume1/docker/dockge/stacks/_haproxy/haproxy.cfg
#
# For `haproxy -f` from this repo path (reviews / CI), include resolves relative to this file:
# proposals/_haproxy → hive → docs → repo root (four parents).
include ../../../../stacks/_haproxy/haproxy.cfg
