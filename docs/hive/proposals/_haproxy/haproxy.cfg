# HAProxy — Synology package layout
# Updated: align backends with Dockge compose under /volume1/docker/dockge/stacks;
# homepage listens on 10.0.1.15:7575 (not 5009). Client IP: option forwardfor if-none (HAProxy 2.4+).
# Hostnames: otsorundscore apex and *.otsorundscore.* only (legacy orundscore names removed).
#
# Hive / Dockge review
# Canonical copy for hive review and consensus lives in this path under the stacks repo.
# Originally at: /Volumes/docker/haproxy.cfg

global
    user sc-haproxy
    daemon
    maxconn 4096
    log ring@httplog local0 info
    spread-checks 10
    ssl-default-bind-options ssl-min-ver TLSv1.2
    ssl-default-bind-ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384

ring httplog
    description "HTTP access log buffer"
    format rfc3164
    maxlen 2048
    size 65535
    backing-file /var/packages/haproxy/var/http-access.log

defaults
    mode http
    log global
    option httplog
    option forwardfor if-none
    option http-server-close
    timeout connect 5s
    timeout client 50s
    timeout server 50s
    timeout tunnel 1h

listen stats
    bind :8280
    stats enable
    stats uri /
    stats show-legends
    stats refresh 10s
    stats realm HAProxy\ Statistics
    # Stats UI credentials: set on the NAS only (e.g. haproxy userlist or include file
    # generated from secrets). Do not commit real usernames/passwords to git.
    stats auth statsadmin:REPLACE_ME_STRONG_PASSWORD

frontend http-redirect
    bind :8080
    redirect scheme https code 301

frontend https-fe
    bind :8443 ssl crt /var/packages/haproxy/var/crt/ alpn h2,http/1.1
    http-request set-header X-Forwarded-Proto https
    http-request set-header X-Real-IP %[src]
    stick-table type ip size 100k expire 30s store http_req_rate(10s)
    http-request track-sc0 src
    http-request deny deny_status 429 if { sc_http_req_rate(0) gt 100 }

    # Apex dashboard (Get Homepage)
    acl host_homepage hdr(host) -i otsorundscore.olutechsys.com otsorundscore.olutech.systems

    acl host_portainer hdr(host) -i portainer.olutechsys.com portainer.olutech.systems portainer.otsorundscore.olutechsys.com portainer.otsorundscore.olutech.systems

    acl host_dozzle hdr(host) -i dozzle.olutechsys.com dozzle.olutech.systems dozzle.otsorundscore.olutechsys.com dozzle.otsorundscore.olutech.systems

    acl host_ittools hdr(host) -i tools.olutechsys.com tools.olutech.systems tools.otsorundscore.olutechsys.com tools.otsorundscore.olutech.systems

    acl host_searxng hdr(host) -i search.olutechsys.com search.olutech.systems search.otsorundscore.olutechsys.com search.otsorundscore.olutech.systems

    acl host_openwebui hdr(host) -i ai.olutechsys.com ai.olutech.systems ai.otsorundscore.olutechsys.com ai.otsorundscore.olutech.systems

    acl host_codexdocs hdr(host) -i docs.olutechsys.com docs.olutech.systems docs.otsorundscore.olutechsys.com docs.otsorundscore.olutech.systems

    acl host_adminer hdr(host) -i adminer.olutechsys.com adminer.olutech.systems adminer.otsorundscore.olutechsys.com adminer.otsorundscore.olutech.systems

    acl host_codeserver hdr(host) -i code.olutechsys.com code.olutech.systems code.otsorundscore.olutechsys.com code.otsorundscore.olutech.systems

    acl host_phpmyadmin hdr(host) -i pma.olutechsys.com pma.olutech.systems pma.otsorundscore.olutechsys.com pma.otsorundscore.olutech.systems

    acl host_openresume hdr(host) -i resume.olutechsys.com resume.olutech.systems resume.otsorundscore.olutechsys.com resume.otsorundscore.olutech.systems
    acl host_hcld hdr(host) -i hcld.otsorundscore.olutechsys.com hcld.otsorundscore.olutech.systems

    use_backend homepage-be     if host_homepage
    use_backend portainer-be    if host_portainer
    use_backend dozzle-be       if host_dozzle
    use_backend ittools-be      if host_ittools
    use_backend searxng-be      if host_searxng
    use_backend openwebui-be    if host_openwebui
    use_backend codexdocs-be    if host_codexdocs
    use_backend adminer-be      if host_adminer
    use_backend codeserver-be   if host_codeserver
    use_backend phpmyadmin-be   if host_phpmyadmin
    use_backend openresume-be   if host_openresume
    use_backend hcld-be         if host_hcld

backend homepage-be
    option httpchk GET /
    server homepage 10.0.1.15:7575 check

backend portainer-be
    option httpchk GET /
    server portainer 10.0.1.15:9000 check

