# HAProxy — Dockge-bound layout (NAS: paths under /volume1/docker/dockge/stacks/_haproxy/)
# This is the file to pass to haproxy -f on the NAS (sibling to certs/ and maps/).
#
# DSM Package Center (HAProxy 3.x): merged with Synology stock global/logging (user sc-haproxy,
# daemon, ring-backed access log). Copy/paste into "Edit configuration" only after validating:
#   sudo /volume1/@appstore/haproxy/sbin/haproxy -c -f /path/to/this/file
# Docker HAProxy (non-package): replace global with log stdout and drop user/daemon/ring — see README.txt
#
# Coexistence: Traefik stacks (traefik-ots / traefik-mft) terminate TLS for services that use them;
# this profile is the HAProxy edge for host-published ports on the NAS (10.0.1.15).
#
# Layout:
#   certs/  PEM bundles only (.pem); no other files — see stacks/_haproxy/README.txt
#   maps/host.map  lowercase Host -> backend name (tabs between columns)
#
# Operator:
#   1) sudo bash scripts/init-nas.sh  (creates stacks/_haproxy/{certs,maps})
#   2) Drop PEMs under stacks/_haproxy/certs/
#   3) haproxy -c -f /volume1/docker/dockge/stacks/_haproxy/haproxy.cfg  (or bash scripts/validate-haproxy-proposal.sh)
#   4) Reload HAProxy (package UI, systemd, or container — your deployment)
#
# If your NAS already uses /volume1/docker/haproxy.cfg (outside dockge/), do not fork the
# full config there — replace it with: include /volume1/docker/dockge/stacks/_haproxy/haproxy.cfg
# or repoint the HAProxy service -f flag to this path after git pull.
#
# Hive proposal mirror: docs/hive/proposals/_haproxy/haproxy.cfg (include wrapper only).

global
    user sc-haproxy
    daemon
    maxconn 4096
    log ring@httplog local0 info
    spread-checks 10
    ssl-default-bind-options ssl-min-ver TLSv1.2
    ssl-default-bind-ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384
    tune.ssl.default-dh-param 2048

# Ring buffer for HTTP access logging (written to file) — Synology package default paths
ring httplog
    description "HTTP access log buffer"
    format rfc3164
    maxlen 2048
    size 65535
    backing-file /var/packages/haproxy/var/http-access.log

defaults
    mode    http
    log     global
    option  httplog
    option  dontlognull
    option  forwardfor if-none
    option  http-server-close
    timeout connect 5s
    timeout client  50s
    timeout server  50s
    timeout tunnel 1h

listen stats
    bind :8280
    stats enable
    stats uri /
    stats show-legends
    stats refresh 10s
    stats realm HAProxy\ Statistics
    # Stats UI credentials: set on the NAS only. DSM stock example often uses otsadmin:<password>.
    stats auth admin:admin

frontend http-redirect
    bind *:8080
    mode http
    redirect scheme https code 301

frontend https-in
    # TLS: at least one readable *.pem under certs/ (fullchain + key). See README.txt if HAProxy alerts on a missing file.
    bind *:443 ssl crt /volume1/docker/dockge/stacks/_haproxy/certs/ alpn h2,http/1.1
    mode http
    http-request set-header X-Forwarded-Proto https
    http-request set-header X-Real-IP %[src]
    stick-table type ip size 100k expire 30s store http_req_rate(10s)
    http-request track-sc0 src
    http-request deny deny_status 429 if { sc_http_req_rate(0) gt 100 }
    use_backend %[req.hdr(host),lower,map(/volume1/docker/dockge/stacks/_haproxy/maps/host.map,homepage-be)]

backend homepage-be
    option httpchk GET /
    server homepage 10.0.1.15:7575 check

backend portainer-be
    option httpchk GET /
    server portainer 10.0.1.15:9000 check

backend dozzle-be
    option httpchk GET /
    server dozzle 10.0.1.15:8892 check

backend ittools-be
    option httpchk GET /
    server ittools 10.0.1.15:8894 check

backend searxng-be
    option httpchk GET /
    server searxng 10.0.1.15:8888 check

backend openwebui-be
    option httpchk GET /
    server openwebui 10.0.1.15:8893 check

backend codexdocs-be
    option httpchk GET /
    server codexdocs 10.0.1.15:8896 check

backend adminer-be
    option httpchk GET /
    server adminer 10.0.1.15:8895 check

backend codeserver-be
    option httpchk GET /
    server codeserver 10.0.1.15:8377 check

backend phpmyadmin-be
    option httpchk GET /
    server phpmyadmin 10.0.1.15:8378 check

backend openresume-be
    option httpchk GET /
    server openresume 10.0.1.15:8889 check

backend hcld-be
    option httpchk GET /
    server hcld 10.0.1.15:3059 check

backend dockge-be
    option httpchk GET /
    server dockge 10.0.1.15:5571 check

# eof — HAProxy 3.x requires LF after the last byte; DSM paste often drops it — see README.txt
