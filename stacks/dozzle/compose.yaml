services:
  dozzle:
    container_name: Dozzle
    image: amir20/dozzle:v10.5.1
    mem_limit: 3g
    cpu_shares: 768
    security_opt:
      - no-new-privileges:true
    restart: on-failure:5
    ports:
      - 8892:8080
    volumes:
      # Docker socket (ro): Dozzle enumerates containers/logs only; ro reduces risk vs a writable socket.
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${STACK_ROOT}/dozzle:/data:rw
    environment:
      PUID: ${PUID:-0}
      PGID: ${PGID:-0}
      DOZZLE_AUTH_PROVIDER: simple
      TZ: America/New_York
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - com.centurylinklabs.watchtower.enable=true
    healthcheck:
      test:
        ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
