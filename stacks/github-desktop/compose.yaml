services:
  github-desktop:
    container_name: Github-Desktop
    # Pin to a specific digest/tag in production; mariushosting guide targets v3.5.6+
    image: ghcr.io/linuxserver/github-desktop:latest
    hostname: github-desktop
    mem_limit: 2g
    cpu_shares: 768
    shm_size: 1g
    security_opt:
      - no-new-privileges:true
      # Electron/Chromium requires unconfined seccomp to function
      - seccomp:unconfined
    cap_add:
      - IPC_LOCK
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: on-failure:5
    ports:
      - "${HOST_PORT:-3405}:3001"
    volumes:
      # Primary persistent config — all linuxserver state lives here
      - /volume1/docker/dockge/stacks/github-desktop/config:/config:rw
      # Optional: mount a host directory for git repos so they survive container re-creates
      # - /volume1/docker/dockge/stacks/github-desktop/data:/config/repos:rw
    environment:
      TZ: ${TZ:-America/New_York}
      PUID: ${PUID:-0}
      PGID: ${PGID:-0}
      CUSTOM_USER: ${CUSTOM_USER:-admin}
      PASSWORD: ${PASSWORD:?PASSWORD env var must be set}
      TITLE: ${TITLE:-Github-Desktop}
    healthcheck:
      # KasmVNC HTTP listener on internal port 3000; nc is bundled in the linuxserver image
      test: ["CMD-SHELL", "nc -z 127.0.0.1 3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    labels:
      - com.centurylinklabs.watchtower.enable=true
    networks:
      - bridge

networks:
  bridge:
    external: true
