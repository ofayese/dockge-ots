services:
  grafana:
    image: grafana/grafana:13.0.1
    container_name: Grafana
    hostname: grafana
    networks:
      - grafana-net
    mem_limit: 512m
    cpu_shares: 512
    security_opt:
      - no-new-privileges:true
    user: ${SYNO_UID:-0}:${SYNO_GID:-0}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    ports:
      - "3340:3000"
    volumes:
      - ${STACK_ROOT}/grafana-prom/data/grafana:/var/lib/grafana:rw
    environment:
      PUID: ${PUID:-0}
      PGID: ${PGID:-0}
      TZ: ${TIMEZONE}
      GF_INSTALL_PLUGINS: grafana-clock-panel,grafana-simple-json-datasource,natel-discrete-panel,grafana-piechart-panel
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.11.3
    command:
      - "--storage.tsdb.retention.time=60d"
      - "--config.file=/etc/prometheus/prometheus.yml"
    container_name: Prometheus
    hostname: prometheus-server
    networks:
      - grafana-net
      - prometheus-net
    mem_limit: 1g
    cpu_shares: 768
    security_opt:
      - no-new-privileges:true
    user: ${SYNO_UID:-0}:${SYNO_GID:-0}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      PUID: ${PUID:-0}
      PGID: ${PGID:-0}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/"]
      interval: 30s
      timeout: 5s
      retries: 3
    volumes:
      - ${STACK_ROOT}/grafana-prom/data/prometheus:/prometheus:rw
      - ${STACK_ROOT}/grafana-prom/prom.yml:/etc/prometheus/prometheus.yml:ro
      # Same token file Watchtower uses (see ../watchtower/compose.yaml + secrets/README.md).
      - ${STACK_ROOT}/grafana-prom/secrets/watchtower_bearer_token.txt:/etc/prometheus/watchtower_bearer_token:ro
    restart: unless-stopped
    depends_on:
      - node-exporter
      - snmp-exporter
      - cadvisor

  node-exporter:
    image: prom/node-exporter:v1.11.1
    command:
      - --collector.disable-defaults
      - --collector.stat
      - --collector.time
      - --collector.cpu
      - --collector.loadavg
      - --collector.hwmon
      - --collector.meminfo
      - --collector.diskstats
    container_name: Prometheus-Node
    hostname: prometheus-node
    networks:
      - prometheus-net
    mem_limit: 256m
    mem_reservation: 64m
    cpu_shares: 512
    security_opt:
      - no-new-privileges:true
    read_only: true
    user: ${SYNO_UID:-0}:${SYNO_GID:-0}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      PUID: ${PUID:-0}
      PGID: ${PGID:-0}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9100/"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  snmp-exporter:
    image: prom/snmp-exporter:v0.30.1
    command:
      - "--config.file=/etc/snmp_exporter/snmp.yml"
    container_name: Prometheus-SNMP
    hostname: prometheus-snmp
    networks:
      - prometheus-net
    mem_limit: 256m
    mem_reservation: 64m
    cpu_shares: 512
    security_opt:
      - no-new-privileges:true
    read_only: true
    user: ${SYNO_UID:-0}:${SYNO_GID:-0}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      PUID: ${PUID:-0}
      PGID: ${PGID:-0}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9116/"]
      interval: 30s
      timeout: 5s
      retries: 3
    volumes:
      - ${STACK_ROOT}/grafana-prom/snmp.yml:/etc/snmp_exporter/snmp.yml:ro
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.52.1
    command:
      - "--docker_only=true"
    container_name: Prometheus-cAdvisor
    hostname: prometheus-cadvisor
    networks:
      - prometheus-net
    mem_limit: 256m
    mem_reservation: 64m
    cpu_shares: 512
    security_opt:
      - no-new-privileges:true
    read_only: true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    # cAdvisor requires host rootfs/sysfs for container metrics (read-only). Documented NAS exception; do not replicate for unrelated stacks.
    volumes:
      - /:/rootfs:ro # EXEMPT cAdvisor host metrics
      - /var/run:/var/run:ro # EXEMPT cAdvisor host metrics
      - /sys:/sys:ro # EXEMPT cAdvisor host metrics
      # Docker socket (ro): cAdvisor reads container stats via the daemon API.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      PUID: ${PUID:-0}
      PGID: ${PGID:-0}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # Watchtower is owned by the fleet stack at ../../watchtower/compose.yaml — do not
  # run a second instance here (avoids duplicate upgrades and conflicting schedules).

networks:
  grafana-net:
    name: grafana-net
    ipam:
      config:
        - subnet: 192.168.50.0/24
  prometheus-net:
    name: prometheus-net
    ipam:
      config:
        - subnet: 192.168.51.0/24
