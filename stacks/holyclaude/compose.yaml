services:
  holyclaude:
    image: coderluii/holyclaude:latest
    container_name: holyclaude
    hostname: holyclaude
    shm_size: 2g
    cap_add:
      - SYS_ADMIN
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined
      - no-new-privileges:true
    mem_limit: 4g # Dev workstation container with browser/tooling overhead.
    cpu_shares: 768 # Interactive IDE + agent workloads need higher relative priority.
    restart: unless-stopped
    # Healthcheck type B: own binary probe (image ships curl)
    # Port 3001 is the CloudCLI web UI (upstream default). 3059 = dev/HMR port.
    healthcheck:
      test:
        - CMD-SHELL
        - curl -fs http://127.0.0.1:3001/ >/dev/null 2>&1 || exit 1
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    ports:
      - "3059:3059"
      - "3001:3001" # CloudCLI web UI — upstream default port
    env_file:
      - .env
    environment:
      - TZ=America/New_York
      - PUID=${PUID:-0}
      - PGID=${PGID:-0}
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL}
      - NOTIFY_DISCORD=${NOTIFY_DISCORD}
    volumes:
      - claude-home:/home/claude/.claude
      # Scoped to holyclaude/data — container sees this as /workspace
      - ${STACK_ROOT}/holyclaude/data:/workspace
      - cloudcli-data:/home/claude/.cloudcli
    labels:
      - com.centurylinklabs.watchtower.enable=true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  claude-home: {}
  cloudcli-data: {}
