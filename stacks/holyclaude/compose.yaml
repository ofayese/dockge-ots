services:
  holyclaude:
    image: coderluii/holyclaude:latest
    container_name: holyclaude
    hostname: holyclaude
    shm_size: 2g
    cap_add:
      - SYS_ADMIN
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined
      - no-new-privileges:true
    mem_limit: 4g # Dev workstation container with browser/tooling overhead.
    cpu_shares: 768 # Interactive IDE + agent workloads need higher relative priority.
    restart: unless-stopped
    # Healthcheck type: B — TCP probe (published 3000; internal listener for UI/VNC-style stack)
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    ports:
      - "3059:3059"
      - "3000:3000"
    env_file:
      - .env
    environment:
      - TZ=America/New_York
      - PUID=${PUID:-0}
      - PGID=${PGID:-0}
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL}
      - NOTIFY_DISCORD=${NOTIFY_DISCORD}
    volumes:
      - claude-home:/home/claude/.claude
      # Scoped to holyclaude/data — container sees this as /workspace
      - ${STACK_ROOT}/holyclaude/data:/workspace
      - cloudcli-data:/home/claude/.cloudcli
    labels:
      - com.centurylinklabs.watchtower.enable=true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  claude-home: {}
  cloudcli-data: {}
