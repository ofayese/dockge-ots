services:
  homepage:
    container_name: Homepage
    image: ghcr.io/gethomepage/homepage:v1.12
    mem_limit: 512m
    cpu_shares: 512
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: on-failure:5
    ports:
      - 10.0.1.15:7575:3000
    volumes:
      - /volume1/docker/dockge/stacks/homepage/config:/app/config:rw
      - /volume1/docker/dockge/stacks/homepage/icons:/app/public/icons:rw
      # Required for the docker.yaml `my-docker` socket integration
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - TZ=America/New_York
      # Allow access from the Synology LAN IP and your domain
      - HOMEPAGE_ALLOWED_HOSTS=10.0.1.15:7575,otsorundscore.olutechsys.com:7575,otsorundscore.olutech.systems:7575,localhost:7575
    healthcheck:
      test:
        ["CMD-SHELL", "wget -qO- http://localhost:3000/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    labels:
      - com.centurylinklabs.watchtower.enable=true
    networks:
      - bridge
    extra_hosts:
      - "otsorundscore.olutechsys.com:10.0.1.15"

networks:
  bridge:
    external: true
