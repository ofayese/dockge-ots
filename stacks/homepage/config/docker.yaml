# ============================================================================
# Docker Socket Integration for Synology DS723+
# ============================================================================
#
# WHAT IS THIS?
# This file configures Homepage to communicate with Docker via the socket
# mounted from the host (see compose.yaml).
#
# THE ENTRY: my-docker
# - "my-docker" is an arbitrary label (could be named anything)
# - It's referenced in services.yaml as: server: my-docker
# - The socket path points to the mount inside the Homepage container
# - socket: /var/run/docker.sock is the INTERNAL path (not the host path)
#
# WHY THIS APPROACH?
# • Direct socket access: No proxy overhead, no extra containers needed
# • Safe on single-node Synology: Socket is confined to your NAS
# • Read-only mount: Homepage cannot modify containers, only observe them
# • Simplicity: Fewer moving parts = easier to maintain
#
# WHY NOT A DOCKER SOCKET PROXY?
# On larger deployments (e.g., Kubernetes clusters), a proxy like
# `tecnativa/docker-socket-proxy` adds security boundaries. For a
# single-NAS homelab, this is unnecessary complexity.
#
# SYNOLOGY SPECIFICS
# • Mount point in compose.yaml: /var/run/docker.sock:/var/run/docker.sock:ro
#   - :ro = read-only (essential for security)
# • Repo default PUID:PGID = 0:0 (root) on Synology per HIVE_OBJECTIVE.md; override in compose env if needed.
# • All services in this stack use label com.centurylinklabs.watchtower.enable=true
# • All services share an external "bridge" network defined at NAS level
#
# REFERENCE
# Marius Hosting (Synology Docker expert):
# https://mariushosting.com/how-to-install-homepage-on-your-synology-nas/
#
# Homepage Docs:
# https://gethomepage.dev/configs/services/
#
# Docker Socket Security:
# https://docs.docker.com/engine/security/
#
# ============================================================================

my-docker:
  socket: /var/run/docker.sock
