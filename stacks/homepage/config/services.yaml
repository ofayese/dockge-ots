# ============================================================================
# Homepage Services Configuration
# ============================================================================
#
# OVERVIEW
# Each service below uses:
#   server: my-docker       → References the socket in docker.yaml
#   container: ContainerName → Must match compose.yaml exactly (CASE-SENSITIVE)
#
# The 'container:' value is critical. If it doesn't match the actual
# container_name: in the compose file, the status indicator (green/red dot)
# won't appear.
#
# SEE ALSO
# For the authoritative mapping of service → container → compose file,
# refer to CONTAINER_MAPPING.md (in this directory).
#
# ORGANIZATION
# Services are grouped by function:
#   - Infrastructure:  Docker management (Portainer, Dockge, etc.)
#   - Management:      Monitoring & admin (Dozzle, Adminer, phpMyAdmin)
#   - Development:     Code editors, databases (Code-Server, MySQL, PostgreSQL)
#   - Productivity:    Documentation & tools (Codex Docs, OpenResume)
#   - AI:              Large language models (Ollama, Open WebUI)
#   - Search & Tools:  Utilities (SearXNG, IT-Tools, acme.sh)
#
# ============================================================================

- Infrastructure:
    - Portainer:
        # Container name from: portainer/compose.yaml (service: portainer)
        icon: portainer.png
        href: https://10.0.1.15:9443/
        description: Docker management UI & remote agent orchestration
        server: my-docker
        container: portainer
        siteMonitor: http://10.0.1.15:9000/
        widget:
          type: portainer
          url: https://10.0.1.15:9443
          env: 1 # Portainer environment ID (verify in Portainer → Endpoints)
          key: REPLACE_WITH_PORTAINER_API_KEY

    - Portainer Agent:
        # Container name from: portainer/compose.yaml (service: portainer_agent)
        icon: portainer.png
        href: https://10.0.1.15:9001/
        description: Edge agent for remote orchestration
        server: my-docker
        container: portainer_agent
        siteMonitor: http://10.0.1.15:9001/

    - Dockge:
        # Container name: "Dockge" — set by Synology startup script (docker run --name="Dockge")
        # Host port: 5571 → container port 5001. NOT the same as Synology DSM (port 5001).
        icon: dockge.png
        href: http://10.0.1.15:5571/
        description: Lightweight Docker Compose stack manager UI
        server: my-docker
        container: Dockge
        siteMonitor: http://10.0.1.15:5571/
        widget:
          type: dockge
          url: http://10.0.1.15:5571
          # Credentials required for widget API. Store in homepage/.env (gitignored):
          #   DOCKGE_USERNAME=<your-dockge-login>
          #   DOCKGE_PASSWORD=<your-dockge-password>
          username: ${DOCKGE_USERNAME}
          password: ${DOCKGE_PASSWORD}

    - Watchtower:
        # Container name from: watchtower/compose.yaml (service: watchtower)
        icon: watchtower.png
        description: Automatic container updates (daily 4 AM EST)
        server: my-docker
        container: Watchtower

