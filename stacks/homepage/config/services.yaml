# ============================================================================
# HOW TO ADD A NEW SERVICE
# ============================================================================
#
# 1. Deploy the new service via its compose.yaml
#    Example:
#      docker compose -f /path/to/compose.yaml up -d
#
# 2. Get the exact container name (case-sensitive):
#      docker ps --filter "name=MyService" --format "{{.Names}}"
#    OR look in its compose.yaml for the line: container_name: MyService
#
# 3. Add to services.yaml with this format:
#
#    - My Service:
#        icon: my-service.png              # icon name from Homepage icon pack
#        href: http://10.0.1.15:PORT/      # external link (optional)
#        description: Brief description    # shows under service name
#        server: my-docker                 # always use the socket
#        container: MyService              # MUST match compose.yaml exactly (CASE-SENSITIVE)
#        siteMonitor: http://10.0.1.15:PORT/  # health endpoint (optional)
#
# 4. Optionally add a widget (if Homepage has support for this service):
#    widget:
#      type: plugin-name                   # e.g., ollama, searxng, portainer
#      url: http://10.0.1.15:PORT          # internal container address
#      # ... additional widget config per Homepage docs
#
# 5. Update CONTAINER_MAPPING.md with the new service for future reference
#
# 6. Restart Homepage:
#      docker compose -f compose.yaml restart
#
# 7. Verify the new service appears:
#      cd /volume1/docker/dockge/stacks/homepage
#      bash verify-integration.sh
#
# ============================================================================
