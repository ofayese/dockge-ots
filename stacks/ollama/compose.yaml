services:
  ollama:
    container_name: otsai-server
    # DS723+: AMD Ryzen R1600 (2 cores / 4 threads), 32 GB RAM, CPU-only.
    # Check https://hub.docker.com/r/ollama/ollama/tags for latest stable.
    image: ollama/ollama:latest
    # 16g: allows 14B Q4_K_M models (8.5 GB) with KV cache headroom.
    # Never exceed 24g — DSM + other stacks need the remaining RAM.
    mem_limit: 16g
    cpu_shares: 1024
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    restart: unless-stopped
    ports:
      - 10.0.1.15:11434:11434
    volumes:
      - ${STACK_ROOT}/ollama/data/ollama:/root/.ollama:rw
    environment:
      - PUID=${PUID:-0}
      - PGID=${PGID:-0}
      - OLLAMA_HOST=0.0.0.0
      # CPU: keep at 1 — parallelism halves per-request throughput on R1600
      - OLLAMA_NUM_PARALLEL=${OLLAMA_NUM_PARALLEL:-1}
      # CPU: only one model in memory at a time
      - OLLAMA_MAX_LOADED_MODELS=${OLLAMA_MAX_LOADED_MODELS:-1}
      # Keep model loaded 30 min after last request (CPU reload takes 15-60s)
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE:-30m}
      # Flash attention reduces KV cache memory for long contexts — always enable on CPU
      - OLLAMA_FLASH_ATTENTION=1
      - TZ=America/New_York
    labels:
      - com.centurylinklabs.watchtower.enable=true
    # Healthcheck type E: ollama binary self-probe via CMD (not CMD-SHELL).
    # curl is not in the ollama image. CMD-SHELL loses the binary PATH on CPU.
    healthcheck:
      test:
        - CMD
        - /usr/bin/ollama
        - list
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    extra_hosts:
      - otsorundscore.olutechsys.com:10.0.1.15
    networks:
      - ollama-net
  ollama-model-init:
    # One-shot service: pulls all required models after Ollama comes online.
    # Uses same image as otsai-server — no additional pull needed.
    # Docker / DSM UI may show this container as Exited — that is SUCCESS (exit 0), not a fault.
    # Do not set restart: unless-stopped here; a long-running init would fight the main ollama service.
    # restart: "no" — intentional: runs once per `docker compose up` cycle.
    # Re-runs on: docker compose up --force-recreate ollama-model-init
    # Models persist in STACK_ROOT/ollama/data/ollama — skips already-pulled models.
    image: ollama/ollama:latest
    container_name: ollama-model-init
    restart: "no" # intentional: one-shot init — not a long-running service
    mem_limit: 256m
    cpu_shares: 128
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: 2m
        max-file: "2"
    # Plain depends_on (no condition:) for Synology Package Center compatibility.
    depends_on:
      - ollama
    volumes:
      - ${STACK_ROOT}/ollama/data/ollama:/root/.ollama:rw
    environment:
      - OLLAMA_HOST=http://ollama:11434
      # Tier 1 — Baseline models (always pull, small/fast)
      # nomic-embed-text: REQUIRED for AnythingLLM RAG embeddings
      - TIER1_MODELS=${OLLAMA_TIER1_MODELS:-phi4:mini nomic-embed-text llama3.2:3b}
      # Tier 2 — Primary models (pull on first boot, ~15-25 min total)
      - TIER2_MODELS=${OLLAMA_TIER2_MODELS:-qwen2.5-coder:7b llama3.1:8b}
      # Tier 3 — Secondary models (optional; set to "" to skip)
      - TIER3_MODELS=${OLLAMA_TIER3_MODELS:-deepseek-r1:7b mistral:7b qwen2.5:7b}
      - TZ=America/New_York
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        echo "[model-init] Waiting for Ollama to accept connections..."
        ATTEMPTS=0
        until /usr/bin/ollama list >/dev/null 2>&1; do
          ATTEMPTS=$$((ATTEMPTS + 1))
          if [ "$$ATTEMPTS" -gt 60 ]; then
            echo "[model-init] ERROR: Ollama did not start within 5 minutes. Exiting."
            exit 1
          fi
          sleep 5
        done
        echo "[model-init] Ollama is ready. Starting model pulls..."

        pull_if_missing() {
          MODEL="$$1"
          # Strip tag for display; check list for base name
          BASE="$${MODEL%%:*}"
          if /usr/bin/ollama list 2>/dev/null | grep -q "^$${BASE}"; then
            echo "[model-init] SKIP  $${MODEL} (already present)"
          else
            echo "[model-init] PULL  $${MODEL} ..."
            /usr/bin/ollama pull "$${MODEL}" && \
              echo "[model-init] OK    $${MODEL}" || \
              echo "[model-init] FAIL  $${MODEL} (network or registry error — will retry on next restart)"
          fi
        }

        echo "[model-init] === Tier 1: baseline models ==="
        for MODEL in $$TIER1_MODELS; do
          pull_if_missing "$$MODEL"
        done

        echo "[model-init] === Tier 2: primary models ==="
        for MODEL in $$TIER2_MODELS; do
          pull_if_missing "$$MODEL"
        done

        echo "[model-init] === Tier 3: secondary models ==="
        for MODEL in $$TIER3_MODELS; do
          pull_if_missing "$$MODEL"
        done

        echo "[model-init] === Complete ==="
        /usr/bin/ollama list
        echo "[model-init] Done. Container will exit (restart: no)."
    networks:
      - ollama-net
  open-webui:
    container_name: otsai-webui
    image: ghcr.io/open-webui/open-webui:v0.9.2
    mem_limit: 2g
    cpu_shares: 768
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    restart: unless-stopped
    ports:
      - 8893:8080
    volumes:
      - ${STACK_ROOT}/ollama/data/open-webui:/app/backend/data:rw
    environment:
      - PUID=${PUID:-0}
      - PGID=${PGID:-0}
      - OLLAMA_BASE_URL=http://10.0.1.15:11434
      - WEBUI_AUTH=1
      - WEBUI_NAME=olutechsys AI
      - WEBUI_URL=${WEBUI_URL:-https://ai.otsorundscore.olutechsys.com}
      # Comma-separated model names shown in dropdown (does NOT auto-pull).
      # ollama-model-init handles auto-pull when the stack starts.
      - DEFAULT_MODELS=${DEFAULT_MODELS:-phi4:mini,qwen2.5-coder:7b,nomic-embed-text}
      - TZ=America/New_York
    depends_on:
      - ollama
    healthcheck:
      test:
        - CMD-SHELL
        - curl -fs http://localhost:8080/health >/dev/null 2>&1 || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      - com.centurylinklabs.watchtower.enable=true
    extra_hosts:
      - otsorundscore.olutechsys.com:10.0.1.15
    networks:
      - ollama-net
networks:
  ollama-net:
    # name: override prevents Docker double-name artefact.
    name: ollama-net
    driver: bridge
    ipam:
      config:
        # Subnet registry: 172.27.0.0/24 allocated to ollama-net
        # See docs/hive/NAS_DEPLOYMENT.md for full subnet registry.
        - subnet: 172.27.0.0/24
          gateway: 172.27.0.1
