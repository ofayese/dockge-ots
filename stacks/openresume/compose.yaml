services:
  openresume:
    container_name: OpenResume
    image: xitanggg/open-resume:latest
    mem_limit: 512m
    cpu_shares: 512
    security_opt:
      - no-new-privileges:true
    restart: on-failure:5
    ports:
      - 10.0.1.15:8889:3000
    environment:
      - PUID=${PUID:-0}
      - PGID=${PGID:-0}
      - NODE_ENV=production
      - NEXT_PUBLIC_BASE_URL=${NEXT_PUBLIC_BASE_URL:-https://resume.otsorundscore.olutechsys.com}
      - TZ=${TZ:-America/New_York}
    extra_hosts:
      - "otsorundscore.olutechsys.com:10.0.1.15"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    labels:
      - com.centurylinklabs.watchtower.enable=true
    networks:
      - bridge
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  bridge:
    external: true
