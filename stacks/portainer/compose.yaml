services:
  portainer:
    image: portainer/portainer-ce:2.41.0-alpine
    container_name: portainer
    mem_limit: 512m
    cpu_shares: 512
    ports:
      - 9000:9000
      - 9443:9443
    volumes:
      # SECURITY: docker.sock grants control of the host Docker API. Portainer requires rw for management UI.
      - /var/run/docker.sock:/var/run/docker.sock
      - ${PORTAINER_DATA_ROOT}:/data:rw # EXEMPT operator legacy Portainer state (outside STACK_ROOT)
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    environment:
      - PUID=${PUID:-0}
      - PGID=${PGID:-0}
      - TZ=America/New_York
    healthcheck:
      test:
        - CMD
        - wget
        - --no-verbose
        - --tries=1
        - --spider
        - http://127.0.0.1:9000/api/system/status
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - com.centurylinklabs.watchtower.enable=true
  portainer_agent:
    image: portainer/agent:2.39.1
    container_name: portainer_agent
    mem_limit: 256m
    cpu_shares: 256
    ports:
      - 10.0.1.15:9001:9001
    volumes:
      # SECURITY: Agent mounts docker.sock rw, host rootfs at /host, and Docker volumes — highest privilege in this repo. Restrict network access.
      - /var/run/docker.sock:/var/run/docker.sock
      - /volume1/@docker/volumes:/var/lib/docker/volumes # EXEMPT Portainer agent Docker volumes
      - /:/host # EXEMPT Portainer agent host rootfs
      - ${PORTAINER_CERT_ROOT}:/certs:ro # EXEMPT operator Portainer TLS
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    cap_drop:
      - ALL
    cap_add:
      - NET_RAW
    environment:
      - PUID=${PUID:-0}
      - PGID=${PGID:-0}
      - AGENT_CLUSTER_ADDR=0.0.0.0
      - AGENT_TLS_CERT=/certs/cert.pem
      - AGENT_TLS_KEY=/certs/key.pem
      - TZ=America/New_York
    labels:
      - com.centurylinklabs.watchtower.enable=true
