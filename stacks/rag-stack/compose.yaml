# Stack: rag-stack
# RAG pipeline: Qdrant vector DB + AnythingLLM (RAG UI/API) + Open WebUI Pipelines.
# Offline-capable: all inference routed to otsai-server (Ollama on NAS LAN IP).
#
# Integration:
#   Open WebUI (otsai-webui) → pipelines at http://10.0.1.15:9099
#   HolyClaude → AnythingLLM REST API at http://10.0.1.15:3002/api/v1/
#   AnythingLLM / Pipelines → Ollama at http://10.0.1.15:11434
#   AnythingLLM → Qdrant at http://qdrant:6333 (internal network)
#
# First deploy on the NAS:
#   1. Ensure Ollama stack is running and nomic-embed-text is pulled:
#        sudo docker exec otsai-server ollama pull nomic-embed-text
#   2. sudo mkdir -p /volume1/docker/dockge/stacks/rag-stack/{data/qdrant,data/anythingllm,config/pipelines}
#   3. cp .env.example .env && nano .env
#        Fill: ANYTHINGLLM_JWT_SECRET, PIPELINES_API_KEY
#   4. docker compose up -d

services:
  qdrant:
    container_name: rag-qdrant
    image: qdrant/qdrant:v1.14.0
    # Rust service; 2g covers typical NAS workloads. Raise to 4g if collections > 1M vectors.
    mem_limit: 2g
    cpu_shares: 768
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    ports:
      - 10.0.1.15:6333:6333 # REST API + web UI dashboard
      - 10.0.1.15:6334:6334 # gRPC
    volumes:
      - ${STACK_ROOT}/rag-stack/data/qdrant:/qdrant/storage:rw
    environment:
      - PUID=${PUID:-0}
      - PGID=${PGID:-0}
      - TZ=${TZ:-America/New_York}
      - QDRANT__TELEMETRY_DISABLED=1
      - QDRANT__SERVICE__API_KEY=${QDRANT_API_KEY:-}
    # Healthcheck type E: Perl TCP+HTTP GET /readyz (no wget/curl/nc in qdrant image; perl is present).
    # /readyz is unauthenticated even when QDRANT__SERVICE__API_KEY is set.
    healthcheck:
      test:
        - CMD
        - perl
        - -e
        - 'use IO::Socket::INET; my $s = IO::Socket::INET->new(PeerAddr => q(127.0.0.1), PeerPort => 6333, Proto => q(tcp), Timeout => 5) or exit 1; print $s "GET /readyz HTTP/1.0\r\nHost: localhost\r\n\r\n"; my $r = join(q(), <$s>); exit($r =~ m(200 OK) ? 0 : 1);'
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    labels:
      - com.centurylinklabs.watchtower.enable=true
    networks:
      - rag-net
  anythingllm:
    container_name: rag-anythingllm
    image: mintplexlabs/anythingllm:1.7.6
    # Node.js RAG server; 2g covers typical workloads with embedding pipeline.
    mem_limit: 2g
    cpu_shares: 768
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    ports:
      - 10.0.1.15:3002:3001
    volumes:
      # AnythingLLM working dir is /app/server; Prisma resolves db at ../storage = /app/storage.
      # Mount MUST target /app/storage (not /app/server/storage).
      - ${STACK_ROOT}/rag-stack/data/anythingllm:/app/storage:rw
    environment:
      - PUID=${PUID:-0}
      - PGID=${PGID:-0}
      - TZ=${TZ:-America/New_York}
      - SERVER_PORT=3001
      # LLM: Ollama on NAS LAN (CPU-only)
      - LLM_PROVIDER=ollama
      - OLLAMA_BASE_PATH=http://10.0.1.15:11434
      # Primary model: qwen2.5-coder:7b is the best coding/research 7B model in 2026
      - OLLAMA_MODEL_PREF=${ANYTHINGLLM_LLM_MODEL:-qwen2.5-coder:7b}
      - OLLAMA_MODEL_TOKEN_LIMIT=${ANYTHINGLLM_MODEL_CTX:-8192}
      # Embeddings: nomic-embed-text (REQUIRED - must be pulled on otsai-server first)
      - EMBEDDING_ENGINE=ollama
      - EMBEDDING_BASE_PATH=http://10.0.1.15:11434
      - EMBEDDING_MODEL_PREF=${ANYTHINGLLM_EMBED_MODEL:-nomic-embed-text:latest}
      - EMBEDDING_MODEL_MAX_CHUNK_LENGTH=8192
      # Vector DB: Qdrant (internal network, service name resolution)
      - VECTOR_DB=qdrant
      - QDRANT_ENDPOINT=http://qdrant:6333
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
      # Auth
      - "JWT_SECRET=${ANYTHINGLLM_JWT_SECRET:?ANYTHINGLLM_JWT_SECRET must be set
        in .env - run: openssl rand -hex 32}"
      - DISABLE_TELEMETRY=1
    depends_on:
      qdrant:
        condition: service_healthy
    extra_hosts:
      - otsorundscore.olutechsys.com:10.0.1.15
    # Healthcheck type A: curl HTTP probe (curl confirmed in image)
    healthcheck:
      test:
        - CMD
        - curl
        - -fs
        - http://127.0.0.1:3001/api/ping
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    labels:
      - com.centurylinklabs.watchtower.enable=true
    networks:
      - rag-net
  pipelines:
    container_name: rag-pipelines
    image: ghcr.io/open-webui/pipelines@sha256:b48e9bc338ce2be0acfbeff01810db72408a12f07739f9e3879c1f2b00952d6e
    # Python LangChain/LangGraph pipeline server extending Open WebUI; 1g sufficient.
    mem_limit: 1g
    cpu_shares: 512
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    ports:
      - 10.0.1.15:9099:9099
    volumes:
      - ${STACK_ROOT}/rag-stack/config/pipelines:/app/pipelines:rw
    environment:
      - PUID=${PUID:-0}
      - PGID=${PGID:-0}
      - TZ=${TZ:-America/New_York}
      - "PIPELINES_API_KEY=${PIPELINES_API_KEY:?PIPELINES_API_KEY must be set in
        .env - run: openssl rand -hex 24}"
      - OLLAMA_BASE_URL=http://10.0.1.15:11434
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
    depends_on:
      qdrant:
        condition: service_healthy
    extra_hosts:
      - otsorundscore.olutechsys.com:10.0.1.15
    # Healthcheck type A: curl HTTP probe (curl confirmed in Python image)
    healthcheck:
      test:
        - CMD
        - curl
        - -fs
        - http://127.0.0.1:9099/
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    labels:
      - com.centurylinklabs.watchtower.enable=true
    networks:
      - rag-net
networks:
  rag-net:
    # name: override prevents Docker from prepending the project name.
    name: rag-net
    driver: bridge
    ipam:
      config:
        # Subnet registry: 172.27.1.0/24 allocated to rag-net
        # See docs/hive/NAS_DEPLOYMENT.md for full subnet registry.
        - subnet: 172.27.1.0/24
          gateway: 172.27.1.1
