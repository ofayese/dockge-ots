services:
  redis:
    container_name: SearXNG-Redis
    image: valkey/valkey:8-alpine
    mem_limit: 256m
    cpu_shares: 512
    security_opt:
      - no-new-privileges:true
    restart: on-failure:5
    command: valkey-server --save "" --appendonly no
    environment:
      - TZ=America/New_York
    networks:
      - bridge
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - com.centurylinklabs.watchtower.enable=true

  searxng:
    container_name: SearXNG
    image: searxng/searxng:2026.4.29-cba0cffa8
    mem_limit: 512m
    cpu_shares: 768
    security_opt:
      - no-new-privileges:true
    restart: on-failure:5
    ports:
      - 10.0.1.15:8888:8080
    volumes:
      - /volume1/docker/dockge/stacks/searxng/config:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=https://search.otsorundscore.olutechsys.com/
      - SEARXNG_REDIS_URL=redis://redis:6379/0
      - UWSGI_WORKERS=4
      - UWSGI_THREADS=4
      - TZ=America/New_York
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - bridge
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - com.centurylinklabs.watchtower.enable=true

networks:
  bridge:
    external: true
