services:
  synology-api-bridge:
    build: .
    image: synology-api-bridge:local
    container_name: SynologyApiBridge
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    env_file:
      - .env
    volumes:
      - ${STACK_ROOT}/synology-api-bridge/data:/data:rw
    ports:
      - "127.0.0.1:8780:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
