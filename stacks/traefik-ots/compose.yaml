services:
  traefik:
    image: traefik:v3
    container_name: traefik-ots
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    ports:
      - ${TRAEFIK_HTTP_PUBLISH:-8880}:8880
      - ${TRAEFIK_HTTPS_PUBLISH:-5443}:5443
      - ${TRAEFIK_DASHBOARD_PORT:-8080}:8080
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${ACME_CERT_ROOT:-/volume1/certs/acme}/ots-sub:/certs/ots-sub:ro
      - ${STACK_ROOT}/traefik-ots/data:/data:rw
      - ${STACK_ROOT}/traefik-ots/config:/etc/traefik:rw
    environment:
      TZ: ${TZ:-America/New_York}
      PUID: ${PUID:-0}
      PGID: ${PGID:-0}
      CF_DNS_API_TOKEN: ${CF_Token}
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.file.filename=/etc/traefik/tls.yaml
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.websecure.address=:443
      - --entrypoints.traefik.address=:8080
      - --ping=true
      - --certificatesResolvers.cloudflare.acme.email=${ACME_EMAIL:-hostmaster@example.com}
      - --certificatesResolvers.cloudflare.acme.storage=/data/acme.json
      - --certificatesResolvers.cloudflare.acme.dnsChallenge.provider=cloudflare
      - --certificatesResolvers.cloudflare.acme.dnsChallenge.delaybeforecheck=10s
      - --api.dashboard=${TRAEFIK_DASHBOARD:-false}
      - --api.insecure=${TRAEFIK_DASHBOARD:-false}
      - --log.level=${TRAEFIK_LOG_LEVEL:-WARN}
      - --accesslog=true
    healthcheck:
      test:
        - CMD
        - wget
        - -qO-
        - http://127.0.0.1:8080/ping
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    networks:
      - traefik-ots
networks:
  traefik-ots:
    name: traefik-ots
    driver: bridge
