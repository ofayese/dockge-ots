# Default TLS: PEMs from acme-sh (Cloudflare DNS-01). Optional Traefik resolver: see ../README.md.
tls:
  certificates:
    - certFile: /certs/ots-sub/fullchain.pem
      keyFile: /certs/ots-sub/privkey.pem
  stores:
    default:
      defaultCertificate:
        certFile: /certs/ots-sub/fullchain.pem
        keyFile: /certs/ots-sub/privkey.pem
