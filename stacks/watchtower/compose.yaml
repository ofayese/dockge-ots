services:
  watchtower:
    container_name: Watchtower
    image: containrrr/watchtower:1.7.1
    mem_limit: 128m
    cpu_shares: 256
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    ports:
      - 10.0.1.15:18787:8080
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - PUID=${PUID:-0}
      - PGID=${PGID:-0}
      - TZ=America/New_York
      - WATCHTOWER_LABEL_ENABLE=1
      - WATCHTOWER_CLEANUP=1
      - WATCHTOWER_INCLUDE_STOPPED=0
      - WATCHTOWER_SCHEDULE=0 0 4 * * *
      - WATCHTOWER_NOTIFICATIONS=shoutrrr
      - WATCHTOWER_NOTIFICATION_URL=${WATCHTOWER_NOTIFICATION_URL}
      - WATCHTOWER_NOTIFICATION_REPORT=1
      - WATCHTOWER_HTTP_API_UPDATE=1
      - WATCHTOWER_HTTP_API_PERIODIC_POLLS=1
      - WATCHTOWER_HTTP_API_METRICS=1
      - WATCHTOWER_HTTP_API_TOKEN=/run/secrets/watchtower_bearer
    secrets:
      - watchtower_bearer
    healthcheck:
      test:
        - CMD
        - /watchtower
        - --health-check
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - ots-net
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
secrets:
  watchtower_bearer:
    # Single source of truth for bearer auth (Prometheus uses the same file).
    file: ../grafana-prom/secrets/watchtower_bearer_token.txt
networks:
  ots-net:
    external: true
