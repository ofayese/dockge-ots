services:
  postgres:
    container_name: Zabbix-Postgres
    image: postgres:15-alpine
    mem_limit: 1g
    cpu_shares: 1024
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    networks:
      - zabbix-net
    environment:
      PUID: ${PUID:-0}
      PGID: ${PGID:-0}
      TZ: ${TZ:-America/New_York}
      POSTGRES_DB: ${POSTGRES_DB:-zabbix}
      POSTGRES_USER: ${POSTGRES_USER:-zabbix}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - ${STACK_ROOT}/zabbix/db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - com.centurylinklabs.watchtower.enable=true

  zabbix-server:
    container_name: Zabbix-Server
    image: zabbix/zabbix-server-pgsql:7.4-alpine
    mem_limit: 1g
    cpu_shares: 1024
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    networks:
      - zabbix-net
    depends_on:
      - postgres
    ports:
      - "${ZABBIX_SERVER_PUBLISH:-10051}:10051"
    environment:
      PUID: ${PUID:-0}
      PGID: ${PGID:-0}
      TZ: ${TZ:-America/New_York}
      DB_SERVER_HOST: postgres
      DB_SERVER_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-zabbix}
      POSTGRES_USER: ${POSTGRES_USER:-zabbix}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - ${STACK_ROOT}/zabbix/data:/var/lib/zabbix
    healthcheck:
      test: ["CMD-SHELL", "zabbix_server -R diaginfo 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - com.centurylinklabs.watchtower.enable=true

  zabbix-web:
    container_name: Zabbix-Web
    image: zabbix/zabbix-web-nginx-pgsql:7.4-alpine
    mem_limit: 512m
    cpu_shares: 768
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    networks:
      - zabbix-net
    depends_on:
      - postgres
      - zabbix-server
    ports:
      - "${ZABBIX_WEB_PORT:-8532}:8080"
    environment:
      PUID: ${PUID:-0}
      PGID: ${PGID:-0}
      TZ: ${TZ:-America/New_York}
      DB_SERVER_HOST: postgres
      DB_SERVER_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-zabbix}
      POSTGRES_USER: ${POSTGRES_USER:-zabbix}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      ZBX_SERVER_HOST: zabbix-server
      ZBX_SERVER_PORT: "10051"
      PHP_TZ: ${TZ:-America/New_York}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - com.centurylinklabs.watchtower.enable=true

  # Optional: uncomment to run Zabbix Agent 2 on this host (not required for SNMPv3 NAS monitoring).
